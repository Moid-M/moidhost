<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>moidhost</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login-page" style="display:none">
    <div class="login-box">
      <h1 class="login-logo">moidhost</h1>
      <p class="login-sub">Minecraft Server Manager</p>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;padding:10px">Sign In</button>
      </form>
      <p class="login-hint">Default credentials were set during installation.</p>
    </div>
  </div>
  <div id="app" style="display:none">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 onclick="closeSidebar()">moidhost</h1>
        <span id="sidebar-user"></span>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="toggleServerList()">
          <span class="section-header-label">Servers</span>
          <span class="section-arrow" id="server-list-arrow">▾</span>
        </div>
        <div id="server-list" class="sidebar-section-body"></div>
      </div>
      <div class="sidebar-footer">
        <button id="manage-users-btn" class="btn btn-sm" style="width:100%;margin-bottom:6px;display:none">👥 Users</button>
        <button id="new-server-btn" class="btn btn-primary" style="width:100%;margin-bottom:6px">+ New Server</button>
        <button class="btn btn-sm" onclick="logout()" style="width:100%">Logout</button>
      </div>
    </aside>
    <div id="sidebar-overlay"></div>
    <main id="main-content">
      <div id="welcome">
        <h2>Select a server</h2>
        <p>Choose a server from the sidebar to manage it.</p>
      </div>
      <div id="user-management" style="display:none">
        <div class="view-header">
          <h2>User Management</h2>
          <button class="btn btn-primary btn-sm" onclick="showUserModal()">+ Add User</button>
        </div>
        <div id="user-list"></div>
      </div>
      <div id="server-view" style="display:none">
        <div class="view-header">
          <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
          <h2 id="server-name"></h2>
          <span id="server-status" class="status-badge"></span>
        </div>
        <nav class="tabs" id="tab-bar">
          <button class="tab active" data-tab="dashboard">Dashboard</button>
          <button class="tab" data-tab="console">Console</button>
          <button class="tab" data-tab="files">Files</button>
          <button class="tab" data-tab="world">World</button>
          <button class="tab" data-tab="backups">Backups</button>
          <button class="tab" data-tab="players">Players</button>
          <button class="tab" data-tab="settings">Settings</button>
        </nav>
        <div id="tab-content"></div>
      </div>
    </main>
  </div>

  <div id="ctx-menu" class="ctx-menu" style="display:none">
    <button class="ctx-item" data-action="download"><span class="ctx-icon">⬇</span> Download</button>
    <button class="ctx-item" data-action="rename"><span class="ctx-icon">✏</span> Rename</button>
    <button class="ctx-item ctx-danger" data-action="delete"><span class="ctx-icon">✕</span> Delete</button>
    <button class="ctx-item ctx-cancel" id="ctx-cancel" style="display:none" onclick="hideCtx()">Cancel</button>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3 id="modal-title">New Server</h3>
      <form id="modal-form">
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button type="button" class="btn" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-confirm">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
